front:
  text: 衆仙讃頌靈章養七
  hash: sha256:bcd8df50965c275389db44a1e33ff293ebcb8a3594252dcdec25014b52789a43
  markers:
  - {type: page-break, offset: 0, content: '', id: KR5b0318_SJB_000-110164a, image: sjb/11/110164a.png}
body:
  text: 青華救苦讃早朝天尊發願大悲心救苦方方化善因五嶽四司皆禀命酆都北府盡停刑真符告下咸蒙赦童子傳宣救罪人元始化身真妙相度人无量道方成午朝天尊誓願度衆生說法裝嚴坐寳林獅子九頭分瑞相慧光一照廓幽隂刀山劒樹皆摧折火翳風雷悉罷停无量大悲來救度酆都地獄悉瞻聞晚朝天尊慧力拯含靈救苦㝷聲破鐵城弘濟无邊隨願度光明普照達幽扄慧風扇處炎煙滅法雨沾時發朽榮无量慈悲咸救度亡魂俱得面慈尊太真夫人贈馬明生辭暫捨墉城内命駕岱山阿仰瞻太清闕雲樓鬱嵯峨虚中有真人來徃何紛葩錬形保自然俯仰挹太和朝朝九天王夕館還西華流精可飛騰吐納養青牙至藥非金石風生自然歌上下淩景霄羽衣何婆娑五嶽非妾室玄都是我家下看榮競子篤似蛙與蟆眄顧塵濁中憂患自相羅苟未悟妙㫖安事於𤥨磨禍湊由道泄宻慎福臻多昔生崑陵宫共講天年延金液雖可遐未若太和仙仰登冥仙臺虚想詠靈人忽遇扶桑王九老仙都真駕驂紫虬輦靈顔一何鮮啓我㝷長涂邀我自然津告以鴻飛術授以玉胎篇瓊膏凝玄氣素女爲我陳俯挹琳鳳腴仰上飄三天雲綱立爾歩五嶽可暫旋玄都安足逺蓬萊在脚間傳受相親愛結友爲天人替即游刑對禍必無愚賢祕則享無傾泄則軀命顛雲林右英夫人㖟楊真人許長史辭駕欻遨八虚迴宴東華房阿毋延軒觀朗嘯躡靈風我爲有待來故乃越滄浪騰躍雲景轅浮觀霞上空霄軿縱横舞紫盖託靈方朱烟纒旍旄羽帔扇香風雷號猛獸玃電吟奮玄龍鈞籟昆庭響金筑唱神鍾採芝滄浪阿掇華八渟峯朱顔日以新劫徃方嬰童養形靜東岑七神自相通風塵有憂哀隕我白鬢公長冥遺遐歎恨不早逸蹤停駕望舒移迴輪返滄浪末覩若人遊偶想安得康良因候青春以敘中懷忘控景浮紫煙八景觀汾流羽童捧瓊漿玉華餞琳腴相期白水涯揚我萎蕤珠滄房煥東霞紫造浮絳晨𩀱德秉道宗作鎮真伯藩八臺可盼目北看乃飛元清淨雲中視眇眇躡景遷吐納洞嶺秀藏暉隱東山久安人事上日也無虚閑豈若易翁質反此孩中顔晨闕太霞構玉室起霄清領略三竒觀浮景翔絶冥丹華空中有金映育挺精八風鼓錦披碧樹曜四靈華盖廕蘭暉紫轡策緑軿結信通神交觸類率天誠何事外象感須覩瑤玉瓊三景秀鬱玄霄映朗八方丹雲浮髙宸逍遥任靈風鼓翼乗素飊竦眄瓊臺中緑盖入恊晨青軿擲空同右揖東林帝上朝太虚皇玉賔剖鳳腦嗷酣飛蘂漿雲鈞回曲寢千音何琅琅錦旍召猛獸華旛正低昻香母折腰唱紫煙排棟梁總轡髙清闕解駕佳人房昔運挺未兆靈化順氣翔心眇玄涯感年隨積椿崇形垢甘臭味動靜失滄浪我友實不爾榮辱昨己忘絳景浮玄晨紫軒乗煙征仰超緑闕内俯眄朱火城東霞啓廣暉神光煥七靈翳映汎三燭流任自齊冥風纏空洞宇香音觸節生手携織女儛併衿匏𤓰庭左徊青羽旗華盖隨雲傾宴寢九度表是非不我營抱真棲太寂金姿日愈嬰豈似愆穢中慘慘無聊生四旌曜明空朱軒飛靈丘玉盖廕七景鼓翼霄上浮九音朗紫空玉璈洞太無宴詠三晨宫唱嘯呼我疇不覺椿巳來豈知二景流佳人雖兼忘而未放百憂長林真可靜巖中自多娛北登玄真闕携手結髙羅香烟散八景玄風鼓絳波仰超琅園津俯眄霄陵阿玉簫雲上奏鳳鳴動九遐乗氣浮太空曷爲躡山阿金莭命羽靈徵兵折萬魔齊挹二晨暉千春方嬰牙喪真投競室不解可奈何仰眄太霞宫金閣曜紫清華房映太素四軒皆朱瓊擲輪空洞津總轡儛緑軿玉華飛雲盖西妃運錦旍飜然塵濁涯儵欻佳人庭宿感應真降所招巳在㝠乗風奏霄晨共酣丹林甖公侯徒眇眇安知真人靈清晨挹絳霞總氣霄上遊徊軿躡曲波遂覩世人憂辭㫖蔚然起不散三秀嵎何若巡玄鄕撫璈爲爾娛君心安有際我願有中無轡景登霄晨遊宴滄浪官綵雲繞丹霞靈藹散八空上真吟瓊室髙仙歌琳房九鳳唱朱籟虚莭錯羽鍾交棲金庭内結我冥中朋俱挹玉醴津倐忽已嬰童云何當路蹲愆痾隨日崇晨遊太素宫控軿觀玉河夕宴鬱絶字朝採圓景華彈璈北寒臺七靈暉紫霞濟濟髙仙舉紛紛塵中羅盤桓囂藹内愆累不當多駕氣騁雲軿晨登大渟丘絳津連岑振清波鼓浚流歩空觀九緯八綱皆巳遊暫宴三金秀來觀建志儔勤懈不相掩是以積百憂凌波越滄浪忽然造金山四顧終日遊罕我雲中人紫闕構虚上玄館衝絶飊琳琅敷靈囿華生結瓊瑤騁軿滄浪津八風激雲韶披羽扇北翳握莭鳴金簫鳳籟和千鍾西童歌晨朝心豁虚無外神襟何朗寥廻舞太空嶺六氣運重幽我途豈能㝷使爾終不彫玄波振滄濤洪津鼓萬流駕景眄六虚思與佳人遊妙唱不我對清音誰可投雲中騁瓊輪何爲塵中趨松栢生玄嶺鬱爲寒林桀繁葩盛嚴冰未肯懼白雪亂世幽重岫巡生道常潔飛此逸轡輪投彼遐人轍公侯可去來何爲不能絶清淨願東山廕景棲靈穴愔愔閑庭虚蘙薈青林宻圓曜映南軒朱風扇幽室拱被閑房内相期啓妙術寥朗逺想玄蕭條神心逸縱心空洞津竦轡䇿朱軿佳人來何遲首徳何時成寓言必可用不用是無情焉得駕欻跡㝷此空中靈微音良有㫖當用慎勿輕事應神機㑹保爾見太平轡景落滄浪騰躍青海津絳煙亂太陽羽盖傾九天雲輿浮空同倐忽滄浪閒來㝷真中友相携侍帝晨玉子恊明德齊首招玉賢下眄八河宫上寢希林巔漱此紫瓊腴方知穢途辛佳人將安在勤之乃得親絳闕排廣霄披丹登景房紫旗振雲霞羽晨儛八風停盖濯碧谿採秀月支峯咀嚼三靈華吐吸九神芒椿數無絶紀恊日積童䝉携袂明真館仰期無上皇北鈞唱羽人玉玄粲賢衆音終云何波浪宇得失爲我鍾引領囂庭内開心擬穢衝習適榮辱域罕躡希林宫一靜安足苦試去視滄浪世珍芬馥交道宗玄霄㑹振衣㝷真疇迴軒風塵際良德映玄暉頴抜粲華蔚宻言多償福沖靜尚真貴𢘆當二象順携手同襟帶何爲人事間日焉生患害有心許斧子言當采五芝芝草不必得汝亦不能來汝來當可得芝草與汝食太極真人智慧經讃學仙絶華念念念相因積去來亂我神神躁靡不歷滅念停虚閑蕭蕭入空寂請經若飢渴持志如金石保子飛玄路五靈度符籍濟我六度行故能解三羅清齋禮太素吐納養雲牙逍遙金闕内玉京爲余家自然生七寳人人坐蓮華仰嚼玄都㮏俯含空洞苽容顔曜十日奚計年劫多法鼓㑹天仙鳴鍾徵大魔靈風扇香花璨爛開繁襟太真撫雲璈衆仙彈靈琴雅歌三天上散慧玉華林七祖昇福堂由此歩玄音前世徳未足斯經邈難㝷信道情不盡圖飛乃反沉太上無爲道弘之在兆心學道由丹信奉師如至親揖景偶清虚孜孜隨日新衆人未得度終不度我身大願有重報玄德畢信然隂惡罪至深對來若轉輪學道甚亦苦晨夕建福田種徳由植樹根深果亦繁子能躭玄尚飄爾昇清天修是無爲道當與善結縁太上弘至道經書智慧篇抜苦由大才超俗以得真靈姿世所竒燁若淵中蓮人行各有本皆由宿世功立德務及時發願莫不從善惡俱待對倚伏理難窮賢士奉法言道徳在兼忘解是大智慧上爲太極公寳盖連玉輿命駕御九龍金華擎洞經捧香悉仙童嘯歌徹玄都鳴玉叩瓊鍾呉子來冩真讃不才呉子知命任真志尚玄素心樂清貧渉歷群山翛然一身學未明道形惟保神山水爲家形影爲隣布裘草帶鹿冠紗巾餌松飲泉經蜀過秦大道杳冥吾師何人矚念下土思彼上賔曠然無巳罔象惟親終日草堂閑清風常徃還耳無塵事擾心有翫雲閑對酒惟思月餐松不厭山時時吟内景自合駐童顔此生此物當生涯白石青松便是家對月臥雲如野鹿時時買酒醉煙霞寂爾孤遊翛然獨立飲木蘭之墜露衣鳥獸之落毛不求利於人間絶賣名於天下此山居之道士也題罷振衣理策而去莫知所在焉仙人貽白永年辭清秋無所事乗霧出遙天憑仗樵人語相期白永年李公佐仙僕詩我有衣中珠不嫌衣上塵我有長生理不厭有生身江南神仙窟吾當混其真不嫌市井諠來救世間人蘇子跡巳徃顓蒙事可親莫言東海變天地有長春攄浩然泛虚舟辭遺欒渾之辭行時雲作伴坐即酒爲侣腹以无化充衣將雲霞𥙷紂虐與堯仁可惜皆朽腐檝棹無所假超然信萍查朝浮旭日輝夕䕃清月華營營功業人朽骨成泥沙得飲攄公酒復登攄公舟便得神體清超遥曠無憂靈響辭比響非谷響心知是靈仙不曽離耳裏髙下如秋蟬入夜聲則勵在晝聲則微神靈斥衆惡與我作風威妙響無住時晝夜常輪迴那是偶然事上界特使來何以辨靈應事須得梯媒自從靈響降如有真人來存念長在心展轉無停音可憐清爽夜靜聽秋蟬吟衆仙歩虚辭飄飄上雲路黯黯入長霄星宫日去逺光隂劫數遥仰德金顔隱傾想佇神飊願得映霞軫焚香稽首朝玄風轉飛盖紫氣汎仙車浮空不待駕合忽昇虚无徘徊哀下界顧眄愍群諸三元真化畢翛然入太虚萬氣浮空上千光合太微霄間望華盖虚重眄霞衣真儀入雲路圓曜逐風飛願得三元㑹金容乗運歸吉光騰紫氣霄路逸丹天旛颺香風轉蓋動超浮煙道中還復道玄中巳復玄真光不識際大道竟無形法輪常自轉希音不可聽空閑待三寳虚中聞洞經七變遊魂反萬氣駐頽齡香風飄羽蓋遊氣轉飊車泠泠上雲路窈窈入長虚顧愍埃塵子應運演靈書妙果諧今日冥契自然符青童大君常吟欲植滅度根當抜生死栽沉吟墮九泉但坐惜形骸南嶽夫人作與許長史靈谷秀瀾縈藏身棲巖京披褐均衮龍帶素齊玉鳴形盤幽遼裏擲神太霞庭霄上有陛賢空中有真聲仰我曲晨飛案此緑軒軿下觀八度内俛歎風塵縈解脱遺波浪登此眇眇身憂竟三津竭奔馳割爾齡南嶽夫人作玄感妙象外和聲自相招雲書鬱紫晨蘭風扇緑軺上真宴瓊臺邈爲地仙標所期貴逺邁故能秀頴翹翫彼八素翰道成初六遼人事胡可豫使爾形氣消衆仙讃頌靈章
